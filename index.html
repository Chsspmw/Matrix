    <style>
        @keyframes digitar {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes cursor {
            from, to { border-color: transparent; }
            50% { border-color: #00FF00; }
        }

        .efeito-digitar {
            display: inline-block;
            overflow: hidden; /* Garante que o texto suma antes de ser digitado */
            white-space: nowrap; /* Impede o texto de quebrar linha durante a animação */
            margin: 0 auto; 
            border-right: 3px solid #00FF00; /* Simula o cursor do terminal de computador */
            animation: 
                digitar 3.5s steps(30, end) infinite alternate, /* Faz o texto digitar e apagar em loop */
                cursor 0.75s step-end infinite;
        }
    </style>
